services:
  tubearchivist:
    container_name: tarchpeek-tubearchivist
    restart: unless-stopped
    image: bbilly1/tubearchivist
    ports:
      - "8000:8000"
    volumes:
      - ta_media:/youtube
      - ta_cache:/cache
    environment:
      - ES_URL=http://archivist-es:9200
      - REDIS_CON=redis://archivist-redis:6379
      - HOST_UID=1000
      - HOST_GID=1000
      - TA_HOST=http://localhost:8000 http://10.0.2.2:8000
      - TA_USERNAME=tarchpeek
      - TA_PASSWORD=tarchpeek-local
      - ELASTIC_PASSWORD=tarchpeek-local
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - archivist-es
      - archivist-redis

  archivist-redis:
    image: redis
    container_name: tarchpeek-archivist-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - ta_redis:/data
    depends_on:
      - archivist-es

  archivist-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: tarchpeek-archivist-es
    restart: unless-stopped
    environment:
      - ELASTIC_PASSWORD=tarchpeek-local
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=true
      - discovery.type=single-node
      - path.repo=/usr/share/elasticsearch/data/snapshot
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ta_es:/usr/share/elasticsearch/data
    expose:
      - "9200"

volumes:
  ta_media:
    name: tarchpeek_ta_media
  ta_cache:
    name: tarchpeek_ta_cache
  ta_redis:
    name: tarchpeek_ta_redis
  ta_es:
    name: tarchpeek_ta_es
